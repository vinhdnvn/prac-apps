name: CI - Build & Push FE

on:
  push:
    branches: [main]
    paths:
      - "apps/fe/**"

jobs:
  build-fe:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push FE image
        uses: docker/build-push-action@v5
        with:
          context: apps/fe
          push: true
          tags: |
            ghcr.io/vinhdnvn/fe:latest
            ghcr.io/vinhdnvn/fe:${{ github.sha }}
